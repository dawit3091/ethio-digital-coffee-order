<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIOBUNA — Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/contactstyle.css">
</head>
<body>

    <!-- NAV -->
    <header class="contact-header">
        <nav>
            <a href="index.html">
                <img src="img/coffee-cup.png" alt="logo" class="logo">
            </a>
            <h2 class="brand">ETHIOBUNA</h2>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="contact.html" class="active">CONTACT</a></li>
                
            </ul>
        </nav>
    </header>

   
    <section class="contact-hero">
        <p class="hero-eyebrow">GET IN TOUCH</p>
        <h1 class="hero-title">We'd Love to<br>Hear From You</h1>
        <p class="hero-tagline"><span class="green">Questions,</span>  <span class="yellow">reservations, or</span><span class="red"> just saying hello</span>  — we're here.</p>
    </section>

   
    <main class="contact-main">
        <div class="form-card">
            <div class="form-intro">
                <h2>Send us a message</h2>
                <p>We usually respond within 24 hours.</p>
            </div>

            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="e.g. Selam Tesfaye">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject">
                    <option value="" disabled selected>Select a topic</option>
                    <option>General Inquiry</option>
                    <option>Reservation</option>
                    <option>Catering & Events</option>
                    <option>Feedback</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
            </div>

            <button class="submit-btn" onclick="handleSubmit()">SEND MESSAGE</button>
            <p class="form-note" id="success-msg" style="display:none">✓ Message sent! We'll get back to you soon.</p>
        </div>
    </main>

    <footer class="contact-footer">
        <p>© 2026 ETHIOBUNA · All rights reserved</p>
    </footer>

    <script>
        function handleSubmit() {
            const name    = document.getElementById('name').value.trim();
            const email   = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            if (!name || !email || !message) {
                alert('Please fill in your name, email, and message.');
                return;
            }
            document.getElementById('success-msg').style.display = 'block';
            document.querySelector('.submit-btn').textContent = '✓ SENT';
            document.querySelector('.submit-btn').disabled = true;
        }
    </script>

</body>
</html>
